<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Aero News Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;}
body {
  background: url("https://frutigeraeroarchive.org/images/wallpapers/windows_xp/windows_xp_6.jpg") center/cover fixed no-repeat;
  min-height: 100vh; padding-bottom: 80px; color: #2c5e3f;
}
header {
  height:70px; display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:700; color:#2f7c4c;
  background: linear-gradient(90deg, rgba(150,180,220,0.7), rgba(255,230,120,0.7));
  backdrop-filter: blur(8px);
}
.newsGrid {
  max-width:1200px; margin:40px auto 0 auto;
  display:grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:30px;
}
.card {
  background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.55));
  backdrop-filter: blur(12px); box-shadow: 0 12px 25px rgba(0,0,0,0.2);
  border-radius:20px; padding:25px; display:flex; flex-direction:column; min-height:400px;
}
.tag { background:#9bd600; color:white; font-weight:600; font-size:12px; padding:4px 12px; border-radius:20px; width:max-content; margin-bottom:15px; user-select:none;}
.title { font-weight:700; font-size:20px; margin-bottom:12px; line-height:1.2; flex-shrink:0;}
.text { font-size:14px; opacity:0.8; flex-grow:1; margin-bottom:20px; overflow-y:auto; max-height:120px; word-wrap: break-word; }
.btn { margin-top:auto; padding:12px 24px; font-weight:600; background:linear-gradient(#fff,#d9e7ff); border-radius:20px; border:none; cursor:pointer; box-shadow:0 5px 10px rgba(0,0,0,0.2); transition:transform 0.15s ease; user-select:none;}
.btn:hover { transform:translateY(-3px);}
.loadMoreContainer { max-width:1200px; margin:30px auto 60px auto; text-align:center;}
.modal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;
}
.modalContent {
  background:#fff; border-radius:20px; max-width:800px; width:90%; max-height:80%; overflow:auto; padding:30px; position:relative;
  box-shadow:0 15px 40px rgba(0,0,0,0.3); word-wrap: break-word; hyphens:auto;
}
.modalClose {
  position:absolute; top:15px; right:20px; font-size:22px; cursor:pointer; font-weight:bold;
}
.modalTitle { font-size:22px; font-weight:700; margin-bottom:15px; }
.modalText { font-size:16px; line-height:1.5; }
</style>
</head>
<body>

<header>🌿 Aero News Portal</header>

<div class="newsGrid" id="news"></div>

<div class="loadMoreContainer">
  <button class="btn" id="loadMoreBtn">Загрузить ещё</button>
</div>

<div class="modal" id="modal">
  <div class="modalContent">
    <span class="modalClose" id="modalClose">&times;</span>
    <div class="modalTitle" id="modalTitle"></div>
    <div class="modalText" id="modalText"></div>
  </div>
</div>

<script>
let allNews = [];
let currentIndex = 0;
const pageSize = 6;

// Функция для короткого текста (превью)
function shortenText(text, maxLength = 150) {
  const plainText = text.replace(/<\/?[^>]+(>|$)/g, "");
  return plainText.length > maxLength ? plainText.slice(0, maxLength) + "..." : plainText;
}

// Загрузка новостей с медузы
async function fetchNews() {
  try {
    const res = await fetch(
      "https://api.rss2json.com/v1/api.json?rss_url=https://meduza.io/rss/all"
    );
    const data = await res.json();
    allNews = data.items;
    currentIndex = 0;
    renderNews();
  } catch (e) {
    console.error("Ошибка загрузки новостей:", e);
  }
}

// Отображение карточек
function renderNews() {
  const container = document.getElementById("news");
  const newsToShow = allNews.slice(currentIndex, currentIndex + pageSize);
  newsToShow.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    const preview = shortenText(item.content || item.description, 150);
    card.innerHTML = `
      <div class="tag">НОВОСТИ</div>
      <div class="title">${item.title}</div>
      <div class="text">${preview}</div>
      <button class="btn">Читать</button>
    `;
    // при клике открываем полный контент
    card.querySelector(".btn").addEventListener("click", () => {
      showModal(item.title, item.content || item.description);
    });
    container.appendChild(card);
  });
  currentIndex += pageSize;
  if(currentIndex >= allNews.length) currentIndex = 0;
}

// Обработчик кнопки "Загрузить ещё"
document.getElementById("loadMoreBtn").addEventListener("click", renderNews);

// Модалка
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalText = document.getElementById("modalText");
const modalClose = document.getElementById("modalClose");

function showModal(title, text) {
  modalTitle.innerHTML = title;
  modalText.innerHTML = text;
  modal.style.display = "flex";
}
modalClose.addEventListener("click", () => (modal.style.display = "none"));
window.addEventListener("click", e => { if(e.target===modal) modal.style.display="none"; });

fetchNews();
</script>

</body>
</html>
