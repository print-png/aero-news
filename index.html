<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero News Live — Твой портал</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #88c000 url('background.jpg') center/cover no-repeat fixed;
            color: #1a4d00; min-height: 100vh;
        }

        /* ШАПКА */
        .main-header {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .logo { font-size: 26px; font-weight: bold; color: #2e7d32; text-shadow: 0 1px 2px white; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 30px; padding: 30px 5%; box-sizing: border-box; }

        /* СЕТКА НОВОСТЕЙ */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .news-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.25) 100%);
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6);
            border-radius: 22px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15); transition: 0.4s; position: relative;
        }

        .news-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.85); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .news-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .news-body { padding: 22px; }
        .news-title { font-size: 18px; font-weight: bold; color: #2e7d32; margin-bottom: 10px; line-height: 1.3; }
        .news-text { font-size: 13px; line-height: 1.5; color: #333; margin-bottom: 15px; }

        .sidebar { display: flex; flex-direction: column; gap: 25px; }
        .gadget {
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 24px; padding: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #side-clock { font-size: 42px; text-align: center; color: #2e7d32; font-weight: 200; text-shadow: 0 0 10px white; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .sidebar { order: -1; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">🍃 AeroNews Live</div>
        <div style="color: #2e7d32; font-weight: bold; font-size: 12px; background: rgba(255,255,255,0.5); padding: 5px 10px; border-radius: 10px;">RSS Edition</div>
    </header>

    <div class="main-layout">
        <main class="news-grid" id="news-container">
            <div style="color: white; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">
                ⏳ Подключаемся к ленте новостей...
            </div>
        </main>

        <aside class="sidebar">
            <div class="gadget">
                <h3>System Time</h3>
                <div id="side-clock">00:00:00</div>
            </div>
        </aside>
    </div>

    <script>
        // 1. ЧАСЫ
        function updateClock() {
            document.getElementById('side-clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. ПОЛУЧЕНИЕ НОВОСТЕЙ ЧЕРЕЗ RSS-ПАРСЕР (КЛЮЧ НЕ НУЖЕН)
        async function loadNews() {
            const container = document.getElementById('news-container');
            // Берем новости из открытого RSS канала (например, Lenta.ru)
            const rssUrl = 'https://lenta.ru';
            const apiUrl = `https://api.rss2json.com{encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === "ok") {
                    container.innerHTML = ""; 
                    data.items.forEach(art => {
                        // All Origins и RSS иногда не дают картинки, ставим заглушку если пусто
                        const img = art.enclosure.link || art.thumbnail || 'faero.jpg';
                        
                        const card = `
                            <article class="news-card">
                                <img src="${img}" class="news-img" onerror="this.src='faero.jpg'">
                                <div class="news-body">
                                    <div class="news-title">${art.title}</div>
                                    <p class="news-text">${art.description.substring(0, 150)}...</p>
                                    <a href="${art.link}" target="_blank" style="color: #6eb300; font-size: 13px; font-weight: bold; text-decoration: none; border-bottom: 1px dashed;">Читать источник →</a>
                                </div>
                            </article>`;
                        container.innerHTML += card;
                    });
                } else {
                    container.innerHTML = `<div style="color:white">Ошибка загрузки ленты. Попробуйте позже.</div>`;
                }
            } catch (e) {
                container.innerHTML = "<div style='color:white'>Не удалось подключиться к новостям. Проверьте интернет.</div>";
            }
        }

        loadNews();
    </script>
</body>
</html>
