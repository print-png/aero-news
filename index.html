<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AeroNewsV1</title>
<link rel="icon" href="favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI",Tahoma,sans-serif;
  background:#4A90E2 url('background.jpg') no-repeat center top fixed;
  background-size:cover;
  color:#333;
}
.wrapper{
  width:1100px;
  margin:0 auto;
  background:#ffffffee;
  backdrop-filter:blur(6px);
  box-shadow:0 0 60px rgba(0,0,0,0.7);
  min-height:100vh;
}
header{
  background:linear-gradient(180deg,#6ec0ff,#1c5a8a);
  height:90px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  color:white;
}
.logo{font-size:32px;text-shadow:0 0 10px rgba(0,0,0,0.5);}
.clock{font-size:14px;opacity:.9;}
nav{
  background:linear-gradient(to bottom,#4a4a4a,#000);
  border-bottom:4px solid #f09609;
  display:flex;
}
nav a{
  color:#eee;text-decoration:none;font-size:13px;padding:12px 20px;border-right:1px solid #333;
  cursor:pointer;
}
nav a:hover{background:rgba(255,255,255,0.15);}
.main-content{
  display:grid;
  grid-template-columns:220px 1fr 220px;
  gap:20px;
  padding:25px;
}
#hero-box{
  background:linear-gradient(135deg,#f0faff,#fff);
  border:1px solid #add8e6;
  padding:25px;
  border-radius:6px;
  margin-bottom:25px;
  transition:border 0.2s;
  cursor:pointer;
}
#hero-box:hover{border:1.5px solid orange;}
.news-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.card{
  background:linear-gradient(#fff,#f8fbff);
  border:1px solid #d0dbe6;
  padding:15px;
  cursor:pointer;
  border-radius:6px;
  transition:border 0.2s;
}
.card:hover{border:1.5px solid orange;}
.card h4{color:#0066cc;font-size:14px;margin-bottom:6px;}
.card-date{font-size:11px;color:#888;margin-bottom:6px;}
.card p{font-size:12px;color:#555;height:50px;overflow:hidden;}
.load-more{
  display:block;margin:30px auto;padding:12px 40px;cursor:pointer;
  border:1px solid #777;background:#f4f4f4;font-size:14px;
}
.sidebar h3{color:#1c5a8a;font-size:15px;border-bottom:1px solid #ddd;margin-bottom:12px;}
.sidebar p{font-size:13px;line-height:1.5;color:#444;}
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center;
}
.vista-window{
  background:#fff;width:900px;max-width:90%;height:80vh;border:1px solid #1c5a8a;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);display:flex;flex-direction:column;
}
.window-header{
  background:linear-gradient(180deg,#5ba4d5,#1c5a8a);color:white;padding:10px 15px;
  display:flex;justify-content:space-between;
}
.x-btn{background:#E81123;color:white;border:none;padding:4px 12px;cursor:pointer;}
.window-body{padding:30px;font-size:15px;line-height:1.7;overflow-y:auto;flex:1;}
footer{background:#f5f5f5;padding:20px;border-top:1px solid #ccc;text-align:center;font-size:11px;color:#999;}
</style>
</head>
<body>

<div class="wrapper">
<header>
<div class="logo">Aero<strong>News</strong> Meduza</div>
<div class="clock" id="clock"></div>
</header>

<nav>
<a id="btnMain">Сначала новые</a>
<a id="btnOld">Сначала старые</a>
</nav>

<div class="main-content">
<aside class="sidebar">
<h3>Левый блок</h3>
<p>не знаю</p>
</aside>

<main>
<div id="hero-box"></div>
<div class="news-grid" id="grid"></div>
<button class="load-more" id="loadMore">Загрузить ещё</button>
</main>

<aside class="sidebar">
<h3>я хз что здесь будет</h3>
<p>чат джбт не смог сделать разделы, завтра доделаю</p>
</aside>
</div>

<footer>© 2026 AeroNews. by print-png</footer>
</div>

<div class="modal-overlay" id="modal">
<div class="vista-window">
<div class="window-header">
<span id="modalTitle"></span>
<button class="x-btn" id="modalClose">X</button>
</div>
<div class="window-body" id="modalText"></div>
</div>
</div>

<script>
let allNews=[], filteredNews=[], newsIndex=1, batch=6;

function strip(html){ let tmp=document.createElement("div"); tmp.innerHTML=html; return tmp.textContent||""; }
function formatDate(date){ return new Date(date).toLocaleString("ru-RU"); }

async function fetchNews(){
const res=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://meduza.io/rss/news");
const data=await res.json();
allNews=data.items;
showMain();
}

function renderHero(){
const hero=filteredNews[0];
document.getElementById("hero-box").innerHTML=`
<h2>${hero.title}</h2>
<div style="font-size:12px;color:#888">${formatDate(hero.pubDate)}</div>
<p style="margin-top:10px">${strip(hero.description).slice(0,200)}...</p>
`;
document.getElementById("hero-box").onclick=()=>showModal(hero.title,hero.content);
}

function renderMore(){
const grid=document.getElementById("grid");
for(let i=0;i<batch;i++){
if(newsIndex>=filteredNews.length){document.getElementById("loadMore").style.display="none";return;}
const item=filteredNews[newsIndex];
const card=document.createElement("div"); card.className="card";
card.innerHTML=`<h4>${item.title}</h4><div class="card-date">${formatDate(item.pubDate)}</div><p>${strip(item.description).slice(0,80)}...</p>`;
card.onclick=()=>showModal(item.title,item.content);
grid.appendChild(card);
newsIndex++;
}
}

function showMain(){
filteredNews=[...allNews];
newsIndex=1;
renderHero();
document.getElementById("grid").innerHTML="";
renderMore();
document.getElementById("loadMore").style.display="block";
}

function showOldNews(){
filteredNews=[...allNews].reverse();
newsIndex=1;
renderHero();
document.getElementById("grid").innerHTML="";
renderMore();
document.getElementById("loadMore").style.display="block";
}

function showModal(t,txt){
document.getElementById("modalTitle").innerText=t;
document.getElementById("modalText").innerHTML=txt;
document.getElementById("modal").style.display="flex";
}

document.getElementById("modalClose").onclick=()=>{document.getElementById("modal").style.display="none";};
document.getElementById("loadMore").onclick=renderMore;
document.getElementById("btnMain").onclick=showMain;
document.getElementById("btnOld").onclick=showOldNews;

function updateClock(){document.getElementById("clock").innerText=new Date().toLocaleString("ru-RU");}
setInterval(updateClock,1000); updateClock();
fetchNews();
</script>

</body>
</html>
