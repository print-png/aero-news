<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/x-icon" href="https://frutigeraeroarchive.org/images/icons/windows_vista/vista_netcenter.ico">
<title>AeroNews</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;}

/* Фон + Aero */
body {
  background: url("background.jpg") center/cover fixed no-repeat;
  position: relative;
  min-height: 100vh;
  padding-top: 60px;
  padding-bottom: 80px;
  color: #2c5e3f;
}
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(12px);
  z-index: -1;
}

/* Шапка */
header {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 60px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 30px;
  background: rgba(255,255,255,0.3); backdrop-filter: blur(10px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index:1000;
}
.headerContent { display:flex; align-items:center; }
.headerContent img { width:36px; height:36px; margin-right:12px; }
.headerTitle { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:700; color:#FFD700; text-shadow:1px 1px 2px rgba(0,0,0,0.3); }

/* GitHub кнопка */
.githubBtn { padding:6px 14px; font-weight:600; font-size:14px; background:linear-gradient(#FFD700,#FFC300); border-radius:8px; border:1px solid #FFA500; color:#000; text-decoration:none; cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,0.2); transition: transform 0.15s ease, box-shadow 0.15s ease; }
.githubBtn:hover { transform: translateY(-2px); box-shadow:0 5px 10px rgba(0,0,0,0.25); }

/* Зелёная кнопка музыки */
.musicBtn {
  padding:6px 14px; 
  font-weight:600; 
  font-size:14px; 
  background: linear-gradient(#28a745, #218838); 
  border-radius:8px; 
  border:1px solid #1e7e34; 
  color:#fff; 
  cursor:pointer; 
  box-shadow:0 3px 6px rgba(0,0,0,0.2); 
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.musicBtn:hover { 
  transform: translateY(-2px); 
  box-shadow:0 5px 10px rgba(0,0,0,0.25); 
}

/* Сетка новостей */
.newsGrid { max-width:1200px; margin:40px auto 0 auto; display:grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap:30px; }
.card {
  background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); box-shadow:0 12px 25px rgba(0,0,0,0.2); border-radius:20px; padding:25px; display:flex; flex-direction:column; min-height:400px;
  opacity:0; transform: translateY(20px); animation: fadeSlideIn 0.6s forwards;
}
@keyframes fadeSlideIn { to { opacity:1; transform:translateY(0); } }

.title { font-weight:700; font-size:20px; margin-bottom:12px; line-height:1.3; flex-shrink:0; color:#1E90FF; text-shadow:1px 1px 3px rgba(0,0,0,0.3);}
.text { font-size:15px; color:#111111; font-weight:600; line-height:1.6; flex-grow:1; margin-bottom:20px; overflow-y:auto; max-height:120px; word-wrap:break-word; padding-right:5px; text-shadow:0 1px 2px rgba(255,255,255,0.6);}
.text a { color:#1E90FF; text-decoration:underline; }
.text a:hover { color:#104E8B; }

.btn { margin-top:auto; padding:8px 16px; font-weight:600; font-size:14px; background: linear-gradient(#FFD700,#FFC300); border-radius:8px; border:1px solid #FFA500; cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,0.2); transition: transform 0.15s ease, box-shadow 0.15s ease; user-select:none; }
.btn:hover { transform:translateY(-2px); box-shadow:0 5px 10px rgba(0,0,0,0.25); }

.loadMoreContainer { max-width:1200px; margin:30px auto 60px auto; text-align:center; }

/* Модальные окна */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(6px); justify-content:center; align-items:center; z-index:999; }
.modalContent { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-radius:20px; border:1px solid rgba(200,200,200,0.4); box-shadow:0 15px 40px rgba(0,0,0,0.25); max-width:800px; width:90%; max-height:80%; overflow:auto; padding:30px; position:relative; word-wrap:break-word; hyphens:auto; color:#000000; text-shadow:0 1px 2px rgba(255,255,255,0.6); }

.modalClose { position:absolute; top:10px; right:10px; width:32px; height:32px; background: linear-gradient(#E81123,#C50F1F); border:1px solid #800000; cursor:pointer; border-radius:2px; }
.modalClose::before, .modalClose::after { content:""; position:absolute; top:50%; left:50%; width:2px; height:18px; background:white; transform-origin:center; }
.modalClose::before { transform:translate(-50%,-50%) rotate(45deg); }
.modalClose::after { transform:translate(-50%,-50%) rotate(-45deg); }
.modalClose:hover { background:linear-gradient(#FF3B30,#E81123); transform:scale(1.1); }
.modalClose:active { transform:scale(0.95); }

.modalTitle { font-size:24px; font-weight:700; margin-bottom:15px; color:#1E90FF; text-shadow:1px 1px 3px rgba(0,0,0,0.2); }
.modalText { font-size:16px; line-height:1.6; color:#111111; text-shadow:0 1px 2px rgba(255,255,255,0.6);}
.modalText a { color:#1E90FF; text-decoration:underline;}
.modalText a:hover { color:#104E8B;}
</style>
</head>
<body>

<header>
  <div class="headerContent">
    <img src="https://frutigeraeroarchive.org/images/icons/windows_vista/vista_netcenter.ico" alt="icon">
    <span class="headerTitle">AeroNews</span>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <a href="https://github.com/print_png" class="githubBtn" target="_blank">GitHub</a>
    <button class="musicBtn" id="musicBtn">Музыка</button>
  </div>
  <audio id="bgMusic" src="music.mp3" loop></audio>
</header>

<div class="newsGrid" id="news"></div>

<div class="loadMoreContainer">
  <button class="btn" id="loadMoreBtn">Загрузить ещё</button>
</div>

<div class="modal" id="modal">
  <div class="modalContent">
    <span class="modalClose" id="modalClose"></span>
    <div class="modalTitle" id="modalTitle"></div>
    <div class="modalText" id="modalText"></div>
  </div>
</div>

<script>
let allNews = [];
let currentIndex = 0;
const pageSize = 6;

function shortenText(text, maxLength = 150) {
  const plainText = text.replace(/<\/?[^>]+(>|$)/g, "");
  return plainText.length > maxLength ? plainText.slice(0, maxLength) + "..." : plainText;
}

async function fetchNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://meduza.io/rss/all");
    const data = await res.json();
    allNews = data.items;
    currentIndex = 0;
    renderNews();
  } catch(e) {
    console.error("Ошибка загрузки новостей:", e);
  }
}

function renderNews() {
  const container = document.getElementById("news");
  const newsToShow = allNews.slice(currentIndex, currentIndex + pageSize);
  newsToShow.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.random() * 0.3}s`;
    const preview = shortenText(item.content || item.description, 150);
    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="text">${preview}</div>
      <button class="btn">Читать</button>
    `;
    card.querySelector(".btn").addEventListener("click", () => showModal(item.title, item.content || item.description));
    container.appendChild(card);
  });
  currentIndex += pageSize;

  if(currentIndex >= allNews.length){
    document.getElementById("loadMoreBtn").style.display = 'none';
  }
}

document.getElementById("loadMoreBtn").addEventListener("click", renderNews);

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalText = document.getElementById("modalText");
const modalClose = document.getElementById("modalClose");

function showModal(title,text){
  modalTitle.innerHTML = title;
  modalText.innerHTML = text;
  modal.style.display = "flex";
}

modalClose.addEventListener("click", ()=>modal.style.display="none");
window.addEventListener("click", e=>{if(e.target===modal) modal.style.display="none";});

fetchNews();

// Музыка
const musicBtn = document.getElementById("musicBtn");
const bgMusic = document.getElementById("bgMusic");
let isPlaying = false;

musicBtn.addEventListener("click", () => {
  if(isPlaying){
    bgMusic.pause();
    musicBtn.textContent = "Музыка";
  } else {
    bgMusic.play();
    musicBtn.textContent = "Пауза";
  }
  isPlaying = !isPlaying;
});
</script>

</body>
</html>
